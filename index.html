<!DOCTYPE html>
<!-- Declaración del tipo de documento HTML5 -->
<html lang="es">
<!-- Inicio del documento HTML con idioma español -->
<head>
    <meta charset="UTF-8">
    <!-- Codificación de caracteres UTF-8 -->
    <title>Mi Portafolio</title>
    <!-- Título de la página -->
    <link rel="stylesheet" href="style.css">
    <!-- Enlace al archivo CSS -->
</head>
<body>
<!-- Inicio del cuerpo de la página -->

    <!-- Cabecera con nombre y profesión -->

<section class="contenedor">
    <!-- Sección principal del contenido -->
    
    <div class="perfil">
        <!-- Div para la foto y descripción personal -->
        <img src="holap.jpeg" alt="Foto de perfil">
        <!-- Imagen de perfil -->

            <!-- Contenedor para el texto sobre mí -->
            <h2>Sobre mí</h2>
            <p>Me apasiona el desarrollo web, la programación, la tecnología y el aprendizaje continuo.</p>
            <button>Contactar</button>
            <!-- Botón de contacto -->
        </div>
    </div>

    <h2>Habilidades</h2>
    <!-- Título de la sección de habilidades -->
    <ul class="habilidades">
        <!-- Lista de habilidades -->
        <li>HTML</li>
        <li>CSS</li>
        <li>Python</li>
        <li>SQL</li>
    </ul>

</section>

</html>
